{% extends "saas/base.html" %}
{% block content %}
{% set fd = form_data or {} %}
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form id="academic-setup-form" class="wizard-form" method="post" action="/saas/onboarding/{{ organization.organization_uuid }}/academic_setup">
    <section class="wizard-section">
        <div class="wizard-section-header">
            <strong>Initial academic structure</strong>
            <p>Set the first academic year TIS should prepare for this School Workspace.</p>
        </div>
        <div class="wizard-grid">
            <div>
                <label for="first_academic_year_name">First academic year</label>
                <input id="first_academic_year_name" name="first_academic_year_name" value="{{ fd.get('first_academic_year_name', academic_setup.first_academic_year_name or '') }}" placeholder="2026-2027" required>
            </div>
            <div>
                <label for="notes">Notes</label>
                <input id="notes" name="notes" value="{{ fd.get('notes', academic_setup.notes or '') }}">
            </div>
        </div>
        <label>
            <input type="checkbox" name="create_default_branch" value="1" {% if fd.get('create_default_branch', '1' if academic_setup.create_default_branch else '') %}checked{% endif %}>
            Use a single default branch if your School Workspace launches with one campus
        </label>
    </section>
    <div class="wizard-actions">
        <a class="btn secondary" href="/saas/onboarding/{{ organization.organization_uuid }}/branches">Back</a>
        <button class="btn secondary" type="submit" name="save_action" value="save_exit">Save draft</button>
    </div>
</form>
{% endblock %}
