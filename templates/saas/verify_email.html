{% extends "saas/base.html" %}
{% block content %}
<header class="page-header">
    <span class="page-eyebrow">Account Setup</span>
    <h1>Email verification</h1>
    <p class="page-subtitle">Confirm your account email before continuing setup.</p>
</header>
{% if success %}<div class="success">{{ success }}</div>{% endif %}
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<div class="actions">
    <a class="btn" href="/saas/login">Sign in</a>
    <a class="btn secondary" href="/saas/signup">Create account</a>
</div>
{% endblock %}
