<!DOCTYPE html>
<html>
<head>
    <title>TIS Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', path='images/tis-browser-icon-v2.png') }}?v=20260227">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', path='images/tis-browser-icon-v2.png') }}?v=20260227">
    <style>
        :root {
            --bg-a: #eceff3;
            --bg-b: #dee3e9;
            --ink: #10233f;
            --muted: #4f6078;
            --brand: #0a4ea3;
            --brand-dark: #073a7d;
            --accent: #c79a14;
            --line: #c8d8ea;
            --danger-bg: #ffe0dc;
            --danger-border: #c62828;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            color: var(--ink);
            font-family: "Trebuchet MS", "Lucida Sans Unicode", "Segoe UI", sans-serif;
            background: linear-gradient(145deg, var(--bg-a), var(--bg-b));
        }

        .shell {
            width: 100%;
            max-width: 920px;
            min-height: 500px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: 0 20px 48px rgba(17, 24, 39, 0.16);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            animation: rise 500ms ease-out;
        }

        .brand-area {
            position: relative;
            overflow: hidden;
            padding: 28px;
            background:
                radial-gradient(220px 180px at 0% 0%, rgba(10, 78, 163, 0.12), transparent 70%),
                radial-gradient(180px 160px at 100% 100%, rgba(199, 154, 20, 0.14), transparent 70%),
                #f6f8fb;
            border-right: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-stack {
            width: min(94%, 420px);
            max-width: 420px;
            display: grid;
            gap: 16px;
            justify-items: center;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(10, 78, 163, 0.08);
            border: 1px solid rgba(10, 78, 163, 0.12);
            color: var(--brand-dark);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-logo-frame {
            width: min(100%, 420px);
            max-width: 420px;
        }

        .brand-logo {
            width: 100%;
            height: auto;
            display: block;
        }

        .form-area {
            padding: 34px;
            background: #fff;
            display: flex;
            align-items: center;
        }

        .form-card {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }

        .form-area h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 24px;
            color: var(--brand-dark);
        }

        .hint {
            margin: 0 0 14px;
            color: var(--muted);
            font-size: 13px;
        }

        .error {
            background: var(--danger-bg);
            color: #7f1d1d;
            padding: 10px 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--danger-border);
            border-radius: 6px;
            font-size: 13px;
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #1f3f6d;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #b9cce3;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 120ms ease, box-shadow 120ms ease;
            background: #f7faff;
        }

        input:focus,
        select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(10, 78, 163, 0.2);
            outline: none;
        }

        .meta-note {
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 11px 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(140deg, var(--brand), var(--brand-dark));
            cursor: pointer;
            transition: transform 120ms ease, filter 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        footer {
            margin-top: 14px;
            text-align: right;
            color: var(--muted);
            font-size: 12px;
        }
            .forgot-row {
                margin-top: 10px;
                text-align: center;
            }

            .forgot-btn {
                width: auto;
                background: none;
                border: none;
                color: var(--brand);
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                padding: 4px 0;
                text-decoration: underline;
                text-underline-offset: 2px;
                transition: color 120ms ease;
            }

            .forgot-btn:hover {
                color: var(--brand-dark);
                transform: none;
                filter: none;
            }

            /* Modal */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(10, 24, 48, 0.45);
                backdrop-filter: blur(3px);
                z-index: 999;
                place-items: center;
            }

            .modal-overlay.is-open {
                display: grid;
            }

            .modal-card {
                background: #fff;
                border: 1px solid var(--line);
                border-radius: 18px;
                box-shadow: 0 24px 56px rgba(10, 24, 48, 0.18);
                padding: 28px 28px 22px;
                width: min(94vw, 360px);
                animation: rise 220ms ease-out;
            }

            .modal-head {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 10px;
                margin-bottom: 6px;
            }

            .modal-head h3 {
                margin: 0;
                font-size: 17px;
                color: var(--brand-dark);
            }

            .modal-close {
                width: auto;
                background: none;
                border: none;
                font-size: 20px;
                line-height: 1;
                color: var(--muted);
                cursor: pointer;
                padding: 0 4px;
                transition: color 120ms ease;
            }

            .modal-close:hover {
                color: var(--ink);
                transform: none;
                filter: none;
            }

            .modal-hint {
                margin: 0 0 16px;
                font-size: 13px;
                color: var(--muted);
            }

            .modal-notice {
                font-size: 13px;
                padding: 9px 12px;
                border-radius: 7px;
                margin-bottom: 12px;
                display: none;
            }

            .modal-notice.is-success {
                background: #e8f5e9;
                border: 1px solid #a5d6a7;
                color: #1b5e20;
                display: block;
            }

            .modal-notice.is-error {
                background: var(--danger-bg);
                border-left: 4px solid var(--danger-border);
                color: #7f1d1d;
                display: block;
            }

            @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .shell {
                grid-template-columns: 1fr;
                min-height: 0;
            }

            .brand-area {
                padding: 24px;
                gap: 18px;
            }

            .form-area {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="brand-area">
            <div class="brand-stack">
                <div class="brand-logo-frame">
                    <img class="brand-logo" src="{{ url_for('static', path='images/TIS_Logo_Adjusted.png') }}" alt="Teacher Information System logo">
                </div>
            </div>
        </section>

        <section class="form-area">
            <div class="form-card">
                 <h2>Login to TIS</h2>
                <p class="hint">Use your assigned User ID and password.</p>

                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}

                <form method="post" action="/login">
                    <div class="field">
                        <label for="username">User ID</label>
                        <input id="username" type="text" name="username" value="{{ username or '' }}" required>
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" type="password" name="password" required>
                    </div>
                    <p class="meta-note">Current academic year: <strong>{{ active_year_name }}</strong></p>
                    <button type="submit">Login</button>
                </form>

                    <div class="forgot-row">
                        <button type="button" class="forgot-btn" onclick="openForgotModal()">Forgot Password?</button>
                    </div>

                <footer>Developed by Mohamad El Ghoche</footer>
            </div>
        </section>
    </main>

        <!-- Forgot Password Modal -->
        <div class="modal-overlay" id="forgotOverlay" onclick="handleOverlayClick(event)">
            <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="forgotTitle">
                <div class="modal-head">
                    <h3 id="forgotTitle">Forgot Password</h3>
                    <button type="button" class="modal-close" onclick="closeForgotModal()" aria-label="Close">&times;</button>
                </div>
                <p class="modal-hint">Enter your User ID and the system administrator will be notified to reset your password.</p>
                <div id="forgotNotice" class="modal-notice"></div>
                <form id="forgotForm" method="post" action="/forgot-password" onsubmit="submitForgotPassword(event)">
                    <div class="field">
                        <label for="forgotUserId">User ID</label>
                        <input id="forgotUserId" type="text" name="user_id" autocomplete="off" required placeholder="Enter your User ID">
                    </div>
                    <button type="submit" id="forgotSubmitBtn">Send Request</button>
                </form>
            </div>
        </div>

        <script>
            function openForgotModal() {
                document.getElementById('forgotOverlay').classList.add('is-open');
                document.getElementById('forgotUserId').focus();
                document.getElementById('forgotNotice').className = 'modal-notice';
                document.getElementById('forgotNotice').textContent = '';
                document.getElementById('forgotForm').style.display = '';
            }

            function closeForgotModal() {
                document.getElementById('forgotOverlay').classList.remove('is-open');
                document.getElementById('forgotUserId').value = '';
            }

            function handleOverlayClick(event) {
                if (event.target === document.getElementById('forgotOverlay')) {
                    closeForgotModal();
                }
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeForgotModal();
            });

            async function submitForgotPassword(event) {
                event.preventDefault();
                const userId = document.getElementById('forgotUserId').value.trim();
                const notice = document.getElementById('forgotNotice');
                const submitBtn = document.getElementById('forgotSubmitBtn');

                if (!userId) {
                    notice.className = 'modal-notice is-error';
                    notice.textContent = 'Please enter your User ID.';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';
                notice.className = 'modal-notice';
                notice.textContent = '';

                // Abort the request automatically after 20 s to prevent infinite loading
                let controller = null;
                let timeoutId = null;
                if (typeof AbortController !== 'undefined') {
                    controller = new AbortController();
                    timeoutId = setTimeout(() => controller.abort(), 20000);
                }

                try {
                    const response = await fetch('/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId }),
                        signal: controller ? controller.signal : undefined,
                    });
                    if (timeoutId) clearTimeout(timeoutId);
                    let data = null;
                    try {
                        data = await response.json();
                    } catch (jsonErr) {
                        data = { ok: false, message: 'Server returned an invalid response.' };
                    }
                    if (data.ok) {
                        notice.className = 'modal-notice is-success';
                        notice.textContent = data.message;
                        document.getElementById('forgotForm').style.display = 'none';
                    } else {
                        notice.className = 'modal-notice is-error';
                        notice.textContent = data.message || 'Something went wrong. Please try again.';
                    }
                } catch (err) {
                    if (timeoutId) clearTimeout(timeoutId);
                    console.error('Forgot Password request failed:', err);
                    if (err && err.name === 'AbortError') {
                        notice.className = 'modal-notice is-error';
                        notice.textContent = 'The request took too long. Please try again.';
                    } else {
                        notice.className = 'modal-notice is-error';
                        notice.textContent = 'Network error. Please check your connection and try again.';
                    }
                } finally {
                    // Always restore the button regardless of outcome
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Request';
                }
            }
        </script>
</body>
</html>
