<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">Teacher Information System logo</title>
  <desc id="desc">Clipboard and magnifier icon with Teacher Information System wordmark</desc>
  <defs>
    <style>
      .teacher {
        fill: #0a4ea3;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        font-size: 122px;
        font-weight: 800;
        letter-spacing: 2px;
      }
      .info {
        fill: #c79a14;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        font-size: 86px;
        font-weight: 800;
        letter-spacing: 2px;
      }
      .system {
        fill: #737b87;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        font-size: 62px;
        font-weight: 700;
        letter-spacing: 7px;
      }
      .rule {
        stroke: #cfd5dd;
        stroke-width: 4;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <image href="tis-browser-icon-v2.png" x="8" y="20" width="320" height="320" preserveAspectRatio="xMidYMid meet" />

  <text class="teacher" x="360" y="155">TEACHER</text>
  <text class="info" x="360" y="258">INFORMATION</text>
  <line class="rule" x1="360" y1="306" x2="555" y2="306" />
  <text class="system" x="590" y="329">SYSTEM</text>
  <line class="rule" x1="942" y1="306" x2="1136" y2="306" />
</svg>
