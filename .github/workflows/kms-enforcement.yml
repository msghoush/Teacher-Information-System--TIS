name: KMS Enforcement

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  kms-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install KMS dependency
        run: python -m pip install reportlab
      - name: Validate KMS impact and generated artifacts
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${HEAD_SHA}^"
          fi
          python scripts/check_kms_impact.py --base "$BASE_SHA" --head "$HEAD_SHA"
