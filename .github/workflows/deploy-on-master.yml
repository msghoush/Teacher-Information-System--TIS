name: Deploy On Master

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  kms-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install KMS dependency
        run: python -m pip install reportlab
      - name: Validate KMS before deployment
        env:
          PUSH_BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE_SHA="$PUSH_BASE_SHA"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="${HEAD_SHA}^"
          fi
          python scripts/kms.py check --base "$BASE_SHA" --head "$HEAD_SHA"

  deploy:
    needs: kms-check
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::warning::DEPLOY_HOOK_URL secret is missing."
            echo "Add it in GitHub repository settings to enable hook-based automatic deployments."
            exit 0
          fi

          curl --fail --silent --show-error --location \
            --request POST "$DEPLOY_HOOK_URL"
