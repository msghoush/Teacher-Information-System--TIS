name: Deploy On Master

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "DEPLOY_HOOK_URL secret is missing."
            echo "Add it in GitHub repository settings to enable automatic deployments."
            exit 1
          fi

          curl --fail --silent --show-error --location \
            --request POST "$DEPLOY_HOOK_URL"
